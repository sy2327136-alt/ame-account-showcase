<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07080c"><meta name="robots" content="noindex,nofollow"><title>商品管理后台｜GF 游戏典藏馆</title><link rel="stylesheet" href="./css/site.css"><link rel="stylesheet" href="./css/admin.css"></head>
<body class="admin-body"><div class="noise"></div><header class="admin-header"><div class="container admin-header-inner"><a class="brand" href="./"><span class="brand-avatar"><img src="./assets/brand-avatar.webp" alt="GF游戏典藏馆原创二次元头像"></span><span>游戏典藏馆</span></a><span class="admin-title">独立商品管理后台</span><div class="admin-header-actions"><a class="btn ghost small" href="./" target="_blank">查看前台</a><button class="btn small" data-disconnect style="display:none">退出连接</button></div></div></header>
<main class="admin-main">
  <section class="connect-wrap" data-connect-panel><div class="admin-panel"><span class="eyebrow">SECURE CONNECTION</span><h1>连接商品仓库</h1><p>后台通过 GitHub 安全更新商品和图片，不需要租服务器。令牌只保存在当前浏览器会话，关闭页面后自动清除。</p><div class="notice">请使用仅限本仓库的 Fine-grained token，并只开放 <b>Contents: Read and write</b> 权限。不要把令牌发给任何人，也不要写进网页代码。</div><div class="form-grid" style="margin-top:18px"><div class="form-group full"><label>GitHub 仓库</label><input class="admin-input" data-connect-repo placeholder="用户名/仓库名，例如 sy2327136/game-account-showcase"></div><div class="form-group"><label>分支</label><input class="admin-input" data-connect-branch value="main"></div><div class="form-group"><label>Fine-grained token</label><input class="admin-input" data-connect-token type="password" autocomplete="off" placeholder="github_pat_…"></div></div><div class="connect-actions"><button class="btn" data-connect>连接并进入后台</button><a class="btn ghost" href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener">创建安全令牌</a></div></div></section>
  <section class="container admin-shell" data-admin-shell><div class="dashboard-head"><div><h1>商品管理</h1><p><span class="status-dot">已连接</span> · <span data-repo-label></span></p></div><button class="btn" data-new-product>＋ 新建商品</button></div>
    <div class="admin-layout"><div class="admin-panel product-list-panel"><div class="panel-head"><h2>全部商品 <span data-product-total></span></h2><input class="admin-input admin-search" data-admin-search placeholder="搜索商品…"></div><div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>商品</th><th>类型</th><th>价格</th><th>状态</th><th>操作</th></tr></thead><tbody data-admin-list></tbody></table></div></div>
      <aside class="admin-panel editor-panel"><h2 data-editor-title>新建商品</h2><form data-product-form><input type="hidden" name="id"><div class="form-grid">
        <div class="form-group"><label>商品类型 *</label><select class="admin-input" name="productType" required><option value="account">游戏账号</option><option value="recharge">游戏充值</option></select></div><div class="form-group"><label>游戏名称 *</label><input class="admin-input" name="gameName" required placeholder="王者荣耀"></div>
        <div class="form-group full"><label>商品标题 *</label><input class="admin-input" name="title" required placeholder="国服百星 · 典藏账号"></div><div class="form-group full"><label>副标题</label><input class="admin-input" name="subtitle" placeholder="安卓QQ｜资料齐全"></div>
        <div class="form-group"><label>现价（元） *</label><input class="admin-input" name="priceYuan" type="number" min="0" step="0.01" required></div><div class="form-group"><label>原价（元）</label><input class="admin-input" name="originalPriceYuan" type="number" min="0" step="0.01"></div>
        <div class="form-group"><label>厂商</label><input class="admin-input" name="publisher" placeholder="腾讯游戏"></div><div class="form-group"><label>平台</label><input class="admin-input" name="platform" placeholder="安卓QQ / PC"></div>
        <div class="form-group"><label>区服</label><input class="admin-input" name="server" placeholder="全区服"></div><div class="form-group"><label>地区</label><input class="admin-input" name="region" placeholder="国服 / 海外"></div>
        <div class="form-group"><label>角标</label><input class="admin-input" name="badge" placeholder="镇店推荐"></div><div class="form-group"><label>标签（逗号分隔）</label><input class="admin-input" name="tags" placeholder="满级, 限定, 可换绑"></div>
        <div class="form-group full"><label>商品介绍</label><textarea class="admin-input" name="description"></textarea></div><div class="form-group full"><label>规格（每行：名称=内容）</label><textarea class="admin-input" name="specs" placeholder="英雄数量=123&#10;皮肤数量=286"></textarea></div>
        <div class="form-group full"><label>商品图片（最多 30 张）</label><div class="upload-zone"><input id="image-upload" type="file" accept="image/jpeg,image/png,image/webp,image/avif" multiple><label class="btn small" for="image-upload">选择图片上传</label><div class="image-count" data-image-count>0 / 30 张 · 第一张作为封面</div></div><div class="image-grid" data-image-grid></div></div>
        <div class="form-group full"><div class="check-row"><label><input type="checkbox" name="active" checked> 上架展示</label><label><input type="checkbox" name="featured"> 首页精选</label></div></div>
      </div><div class="progress" data-progress><div class="progress-bar"><span data-progress-bar></span></div><div class="progress-text" data-progress-text>准备保存…</div></div><div class="form-actions"><button class="btn" type="submit" data-save>保存并发布</button><button class="btn ghost" type="button" data-reset-form>清空</button></div></form></aside>
    </div>
  </section>
</main><div class="toast" data-toast></div><script src="./js/config.js"></script><script src="./js/common.js"></script><script src="./js/admin.js"></script></body></html>
